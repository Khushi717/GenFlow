<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FlowMind AI - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary": "#ffb869",
                      "surface-container-highest": "#353534",
                      "secondary-fixed-dim": "#adc6ff",
                      "on-primary-container": "#340080",
                      "on-secondary-container": "#e6ecff",
                      "on-surface": "#e5e2e1",
                      "primary-fixed-dim": "#d0bcff",
                      "on-error-container": "#ffdad6",
                      "on-secondary": "#002e6a",
                      "tertiary-fixed-dim": "#ffb869",
                      "secondary": "#adc6ff",
                      "primary": "#d0bcff",
                      "on-secondary-fixed-variant": "#004395",
                      "surface-container-high": "#2a2a2a",
                      "outline-variant": "#494454",
                      "on-background": "#e5e2e1",
                      "primary-container": "#a078ff",
                      "on-tertiary-fixed": "#2c1700",
                      "error-container": "#93000a",
                      "surface-bright": "#3a3939",
                      "secondary-fixed": "#d8e2ff",
                      "on-error": "#690005",
                      "on-surface-variant": "#cbc3d7",
                      "surface-container-low": "#1c1b1b",
                      "on-tertiary": "#482900",
                      "primary-fixed": "#e9ddff",
                      "surface": "#131313",
                      "on-tertiary-fixed-variant": "#673d00",
                      "on-primary-fixed-variant": "#5516be",
                      "surface-container-lowest": "#0e0e0e",
                      "background": "#131313",
                      "on-primary": "#3c0091",
                      "on-primary-fixed": "#23005c",
                      "inverse-surface": "#e5e2e1",
                      "surface-container": "#201f1f",
                      "error": "#ffb4ab",
                      "inverse-primary": "#6d3bd7",
                      "tertiary-container": "#ca801e",
                      "surface-dim": "#131313",
                      "surface-tint": "#d0bcff",
                      "secondary-container": "#0566d9",
                      "surface-variant": "#353534",
                      "outline": "#958ea0",
                      "tertiary-fixed": "#ffdcbb",
                      "inverse-on-surface": "#313030",
                      "on-tertiary-container": "#3f2300",
                      "on-secondary-fixed": "#001a42"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {
                      "section-gap": "120px",
                      "gutter": "32px",
                      "container-max": "1280px",
                      "unit": "8px",
                      "margin-mobile": "20px"
              },
              "fontFamily": {
                      "display-xl-mobile": ["Inter"],
                      "body-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "label-sm": ["Inter"],
                      "headline-md": ["Inter"],
                      "headline-lg": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "display-xl": ["Inter"]
              },
              "fontSize": {
                      "display-xl-mobile": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.03em", "fontWeight": "800"}],
                      "body-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "letterSpacing": "0em", "fontWeight": "400"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "headline-md": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "headline-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "headline-lg-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "display-xl": ["72px", {"lineHeight": "80px", "letterSpacing": "-0.04em", "fontWeight": "800"}]
              }
            }
          }
        }
    </script>
    <style>
        .radial-blur {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }
        .blur-purple {
            background: rgba(160, 120, 255, 0.5); /* primary-container approx */
            top: -100px;
            left: -100px;
        }
        .blur-blue {
            background: rgba(5, 102, 217, 0.4); /* secondary-container approx */
            bottom: -100px;
            right: -100px;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-input {
            background-color: #050505;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .glass-input:focus-within {
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 1px theme('colors.primary'), 0 0 15px rgba(208, 188, 255, 0.2);
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, theme('colors.primary-container'), theme('colors.inverse-primary'));
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-gradient:hover {
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.6);
            transform: translateY(-1px);
        }

        .divider-gradient {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-body-md">
    <!-- Atmospheric Orbs -->
    <div class="radial-blur blur-purple"></div>
    <div class="radial-blur blur-blue"></div>

    <main class="w-full max-w-md mx-auto p-margin-mobile relative z-10">
        <div class="glass-card rounded-xl p-8 md:p-10 w-full flex flex-col gap-8">
            <!-- Header -->
            <div class="flex flex-col items-center text-center space-y-4">
                <a href="index.html" class="w-16 h-16 rounded-full flex items-center justify-center bg-gradient-to-tr from-primary-container to-secondary-container p-[1px] hover:scale-105 transition-transform">
                    <div class="w-full h-full rounded-full bg-surface-container-highest flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary" style="font-size: 32px; font-variation-settings: 'FILL' 1;">
                            all_inclusive
                        </span>
                    </div>
                </a>
                <div>
                    <h1 class="font-headline-md text-headline-md font-bold text-on-surface mb-2">Welcome Back</h1>
                    <p class="font-body-md text-body-md text-on-surface-variant">Enter your credentials to access your AI flow</p>
                </div>
            </div>
            
            <!-- Social Auth -->
            <button class="w-full flex items-center justify-center gap-3 py-3 px-4 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 transition-colors text-on-surface font-label-sm text-label-sm">
                <svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
                </svg>
                Continue with Google
            </button>
            
            <!-- Divider -->
            <div class="flex items-center gap-4">
                <div class="flex-1 divider-gradient"></div>
                <span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider text-xs">or continue with email</span>
                <div class="flex-1 divider-gradient"></div>
            </div>
            
            <!-- Form -->
            <form class="flex flex-col gap-5" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <!-- Email Input -->
                <div class="flex flex-col gap-2">
                    <label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">Email Address</label>
                    <div class="relative glass-input rounded-full flex items-center px-4 py-3">
                        <span class="material-symbols-outlined text-outline mr-3">mail</span>
                        <input class="bg-transparent border-none outline-none w-full text-on-surface font-body-md text-body-md placeholder:text-outline/50 focus:ring-0 p-0" id="email" placeholder="name@company.com" required="" type="email"/>
                    </div>
                </div>
                <!-- Password Input -->
                <div class="flex flex-col gap-2">
                    <label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="password">Password</label>
                    <div class="relative glass-input rounded-full flex items-center px-4 py-3">
                        <span class="material-symbols-outlined text-outline mr-3">lock</span>
                        <input class="bg-transparent border-none outline-none w-full text-on-surface font-body-md text-body-md placeholder:text-outline/50 focus:ring-0 p-0" id="password" placeholder="••••••••" required="" type="password"/>
                        <button class="ml-2 text-outline hover:text-primary transition-colors focus:outline-none" type="button" id="togglePassword">
                            <span class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Actions -->
                <div class="flex items-center justify-between mt-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input class="w-4 h-4 rounded border-outline bg-transparent text-primary focus:ring-primary focus:ring-offset-background group-hover:border-primary transition-colors cursor-pointer" type="checkbox"/>
                        <span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors text-sm">Remember Me</span>
                    </label>
                    <a class="font-body-md text-body-md text-primary hover:text-primary-fixed transition-colors text-sm" href="#">Forgot Password?</a>
                </div>
                <!-- Submit -->
                <button class="mt-4 w-full py-4 rounded-full btn-gradient text-on-primary font-label-sm text-label-sm uppercase tracking-wider font-bold" type="submit">
                    Sign In
                </button>
            </form>
            
            <!-- Footer -->
            <div class="text-center mt-2">
                <p class="font-body-md text-body-md text-on-surface-variant">
                    New to FlowMind? 
                    <a class="text-primary hover:text-primary-fixed ml-1 transition-colors border-b border-primary/30 hover:border-primary" href="#">Create an account</a>
                </p>
            </div>
        </div>
    </main>

    <script>
        const passwordInput = document.getElementById('password');
        const toggleButton = document.getElementById('togglePassword');
        const visibilityIcon = toggleButton.querySelector('.material-symbols-outlined');

        toggleButton.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility';
            }
        });
    </script>
</body>
</html>
